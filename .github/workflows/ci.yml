name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + Test (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Opt into Node.js 24 ahead of the June 2026 forced migration
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Minimal settings so config/settings.py can be imported
      GOOGLE_CLOUD_PROJECT:  test-project
      GCS_BUCKET:            test-bucket
      DATABASE_URL:          postgresql+asyncpg://retail:retail@localhost:5432/retail
      OPENAI_API_KEY:        sk-test-key
      SCHEDULER_SECRET:      test-secret-do-not-use

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     retail
          POSTGRES_PASSWORD: retail
          POSTGRES_DB:       retail
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U retail"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[base,etl,rag,api,dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy type check
        run: mypy api config db pipeline rag etl

      - name: Run tests
        run: pytest --tb=short

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --target runtime -t retail-forecasting-api:ci .
