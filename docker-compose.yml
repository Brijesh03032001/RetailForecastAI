version: "3.9"

services:
  # ── PostgreSQL (local dev / test) ──────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     retail
      POSTGRES_PASSWORD: retail
      POSTGRES_DB:       retail
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI application ─────────────────────────────────────
  api:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://retail:retail@postgres:5432/retail"
      ENVIRONMENT:  "development"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Mount local FAISS index and docs in dev
      - ./data:/app/data:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/health').raise_for_status()"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
